name: ci

on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t hevy-mcp:ci .
      - name: Image size guard (<200MB)
        run: |
          size=$(docker image inspect hevy-mcp:ci --format '{{.Size}}')
          mb=$((size / 1024 / 1024))
          echo "image size: ${mb}MB"
          test "$mb" -lt 200
